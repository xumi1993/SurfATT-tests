
#######################################
# data parameters
#######################################
data:
  src_rec_file_ph: src_rec_data_wus.csv
  src_rec_file_gr: src_rec_file_gr.csv
  # src_rec_file_ph: OUTPUT_FILES/src_rec_file_forward_ph.csv
  # src_rec_file_gr: OUTPUT_FILES/src_rec_file_forward_gr.csv
  # src_rec_file: /home/xumijian/Codes/SurfATT/test/00_checkerboard_iso/src_rec_test_all.csv
  iwave: 2 # 1 Love wave, 2 Rayleigh wave
  vel_type: [True, False] # use phase velocity, group velocity or both
  weights: [0.5, 0.5] # weights for phase and group velocity

output:
  output_path: OUTPUT_FILES_ph_aniso/ # path to save output files
  output_initial_model: True # whether output initial model
  output_in_process_data: True
  output_in_process_model: True
  log_level: 2 # 1 debug mode, 2: info mode, 3: warning mode, 4: error mode

domain:
  depth_min_max: [0, 80] # depth range in km
  grid_method: 0 # 0: grid by interval; 1: grid by min max and number of grid
  grid_method_0:
    interval: [0.1, 0.1, 2] # interval of lon(degree), lat(degree), z(km)
    num_grid_margin: 5 # number of grid margin
  grid_method_1:
    lon_min_max: [-125.5, -103.5]
    lat_min_max: [29, 49.5]
    n_grid: [221, 201, 41] # number of grid in lon, lat, z

model:
  # ------- Initial model --------
  init_model_type: 1 # 0: increase from v0 to v1; 1: 1D inversion for average tt; 2: use a 3D vs model
  vel_range: [3.2, 4.8]
  init_model_path: csem.h5 # Path to initial model. Only valid in init_model_type: 2

topo:
  is_consider_topo: False # whether consider topography
  topo_file: /path/to/topo.grd # Path to local elevation file. Only valid in topo_type: 1 and 2
  wavelen_factor: 2.5

postproc:
  kdensity_coe: 0  # Kdensity_coe is used to rescale the final kernel:  kernel -> kernel / pow(density of kernel, Kdensity_coe).
  independent_smooth_ani: False
  smooth_method: 0 # 0: Gaussian smoothing; 1: multi-grid smoothing
  smooth_method_0:
    sigma: [0.6, 12]
    sigma_ani: [0.6, 12]
  smooth_method_1:
    n_inv_components: 5
    n_inv_grid: [20, 25, 20]
    n_inv_grid_ani: [8, 9, 8]

inversion:
  # ------- Inversion parameters --------
  is_anisotropy: True
  use_alpha_beta_rho: false
  rho_scaling: false
  # ------- Inversion parameters --------
  niter: 100 # max iterations
  min_derr: 0.0005 # minimum error change
  # ------- optimization parameters -------
  optim_method: 1 # 0: SD (adeptive step length); 1: LBFGS (line search)
  step_length: 0.02 # starting step length
  maxshrink: 0.6 # max step length descent
  # ------- Line search for LBFGS -------
  c1: 0.1
  c2: 0.9
  max_sub_niter: 10 # max sub iterations for line search